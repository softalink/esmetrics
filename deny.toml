# cargo-deny configuration for EsMetrics.
# Runs in CI; gates dependency licenses, advisories, sources, and bans.
# See https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    # webpki-roots ships Mozilla's CA bundle under CDLA-Permissive-2.0.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = [
    # OpenSSL is replaced by rustls in our stack; bind only via direct C deps if unavoidable.
    { crate = "openssl-sys", reason = "Prefer rustls; if a transitive dep pulls this, gate it explicitly." },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
