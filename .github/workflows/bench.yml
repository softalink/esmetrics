name: bench

# Parity benchmarks against the rolling baseline. Per PLAN.md §7.3, a >3%
# regression fails the build. Real benchmarks land in Phase 1; this workflow
# is wired up early so the scaffolding is exercised on every PR.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: bench (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Self-hosted runner for pinned-CPU reproducibility (PLAN.md §11.3).
          # Falls back to ubuntu-latest until the self-hosted runner is online.
          - label: linux-x86_64-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: windows-x86_64-msvc
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - label: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-${{ matrix.label }}
      - name: cargo xtask bench
        run: cargo xtask bench
