name: Release

on:
  push:
    tags: ["v1.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach artifacts to (e.g. v1.146.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
          - name: windows-amd64
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build all release binaries
        run: cargo build --release --workspace --bins

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          for b in esmetrics esmagent esmalert esmalert-tool esmauth esmctl esbackup esrestore; do
            STAGE="$b-$TAG-linux-amd64"
            mkdir -p "$STAGE"
            cp "target/release/$b" LICENSE NOTICE README.md "$STAGE/"
            tar czf "$STAGE.tar.gz" "$STAGE"
            sha256sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"
          done

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          foreach ($b in 'esmetrics','esmagent','esmalert','esmalert-tool','esmauth','esmctl','esbackup','esrestore') {
            $stage = "$b-$tag-windows-amd64"
            New-Item -ItemType Directory -Path $stage | Out-Null
            Copy-Item "target/release/$b.exe", LICENSE, NOTICE, README.md $stage/
            Compress-Archive -Path $stage -DestinationPath "$stage.zip"
            (Get-FileHash "$stage.zip" -Algorithm SHA256).Hash.ToLower() + "  $stage.zip" `
              | Out-File -Encoding ascii "$stage.zip.sha256"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          if-no-files-found: error
          path: |
            *-linux-amd64.tar.gz
            *-linux-amd64.tar.gz.sha256
            *-windows-amd64.zip
            *-windows-amd64.zip.sha256

  release:
    name: Attach artifacts to release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            *-linux-amd64.tar.gz
            *-linux-amd64.tar.gz.sha256
            *-windows-amd64.zip
            *-windows-amd64.zip.sha256
