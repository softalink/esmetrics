name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  test:
    name: test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64-gnu
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - label: linux-x86_64-musl
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            apt: musl-tools
          - label: macos-aarch64
            target: aarch64-apple-darwin
            os: macos-14
          - label: macos-x86_64
            target: x86_64-apple-darwin
            os: macos-13
          - label: windows-x86_64-msvc
            target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: install musl toolchain
        if: matrix.apt == 'musl-tools'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}
      - name: cargo test
        run: cargo test --workspace --target ${{ matrix.target }}

  cross-aarch64:
    name: cross-build linux-aarch64-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: install cross linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-aarch64
      - name: cargo build (cross)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: cargo build --workspace --target aarch64-unknown-linux-gnu --release
      # Running the test suite on aarch64 needs either qemu or a self-hosted
      # arm runner — see docs/state/decisions.md ADR-001 §5–6. CI smoke is
      # gated on the build succeeding; the full test matrix lands when the
      # owner-provided self-hosted arm runner is online.
